name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Validate
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
      - name: Build release binary
        run: cargo build --release --all-features
      - name: Package
        run: |
          mkdir -p dist/wzry-search-mcp-linux-x86_64
          cp target/release/wzry-search-mcp dist/wzry-search-mcp-linux-x86_64/
          cp README.md SPEC.md CHANGELOG.md LICENSE config.example.toml dist/wzry-search-mcp-linux-x86_64/
          cp -r docs schemas dist/wzry-search-mcp-linux-x86_64/
          tar -C dist -czf dist/wzry-search-mcp-linux-x86_64.tar.gz wzry-search-mcp-linux-x86_64
          tar -tzf dist/wzry-search-mcp-linux-x86_64.tar.gz | tee dist/wzry-search-mcp-linux-x86_64.contents.txt
          grep -Fx wzry-search-mcp-linux-x86_64/CHANGELOG.md dist/wzry-search-mcp-linux-x86_64.contents.txt
          grep -Fx wzry-search-mcp-linux-x86_64/config.example.toml dist/wzry-search-mcp-linux-x86_64.contents.txt
          grep -Fx wzry-search-mcp-linux-x86_64/schemas/hero-profile.schema.json dist/wzry-search-mcp-linux-x86_64.contents.txt
          (cd dist && sha256sum wzry-search-mcp-linux-x86_64.tar.gz > wzry-search-mcp-linux-x86_64.tar.gz.sha256)
      - uses: actions/upload-artifact@v7
        with:
          name: wzry-search-mcp-linux-x86_64
          path: |
            dist/wzry-search-mcp-linux-x86_64.tar.gz
            dist/wzry-search-mcp-linux-x86_64.tar.gz.sha256
          if-no-files-found: error
      - name: Create GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/wzry-search-mcp-linux-x86_64.tar.gz \
              dist/wzry-search-mcp-linux-x86_64.tar.gz.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/wzry-search-mcp-linux-x86_64.tar.gz \
              dist/wzry-search-mcp-linux-x86_64.tar.gz.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
